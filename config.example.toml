# cleancensus pipeline configuration (TOML).
# Run with:  uv run cleancensus --config config.toml

[data]
inputs_dir  = "data/inputs"    # must contain the three canonical input files (see docs/DATA.md)
outputs_dir = "data/outputs"   # versioned outputs + run manifest land here
version_tag = "v2"             # suffix for output files, e.g. ..._v2.parquet
# destatis_raw_dir = "data/raw/destatis"  # auto-derived; override only if ZIPs are elsewhere
# Note: when the corresponding producer stage is enabled (e.g. stages.ages / stages.topics8 /
# stages.regiostar), the pipeline automatically reads intermediate artifacts from data/work/
# instead of the canonical inputs_dir files (stage-gated input resolution — full-mode chain).

# RegioStaR reference workbook (regiostar stage).  Default: auto-discovered in this order:
#   1. data/raw/regiostar/bbsr-referenz-gebietsstand-2022.xlsx  (BBSR Referenz Gemeinden 31.12.2022)
#   2. data/inputs/regiostar_referenzdatei.xlsx                 (legacy BMDV Gebietsstand 2020)
#   3. eqasim-bs copy of regiostar_referenzdatei.xlsx           (machine-local fallback)
# Uncomment to override:
# regiostar_ref   = "data/raw/regiostar/bbsr-referenz-gebietsstand-2022.xlsx"
# regiostar_sheet = "Gemeindereferenz (inkl. Kreise)"  # leave empty for auto-detect

[harmonize]
# Choose ONE of the following selectors (or omit both for the MiD-controllable default):
# topics = "all"                                  # everything in the catalog
# tiers  = [1, 2]                                 # catalog tiers
topics = ["Whg_Gebaeudetyp", "HH_Seniorenstatus"] # explicit topic names
derived_tenure = true          # owner/renter households derived from Eigentuemerquote
derived_vacancy = false        # occupied/vacant dwellings derived from Leerstandsquote (universe A anchor, ~3% below official B)

[scope]
mode = "national"              # "national" or "subset"
# ars_prefixes = ["03101", "03102", "03151", "03153", "03154", "03157", "03158", "03103"]  # ZGB example (subset only)

[run]
sanity = "fail"                # "fail" = abort on invariant violation | "warn" | "skip"
write_manifest = true          # write run_manifest_<version_tag>.json next to the outputs
